model_path: /nvme-data/ligm/models/ModernBERT-base
output_dir: /nvme-data/ligm/runs/stage3-ligm-weighted8-seed11
resume_from: /nvme-data/ligm/runs/stage1-random-seed11/checkpoints/tokens-1000016532.pt
attention_implementation: flash_attention_2
data:
  kind: mds
  cache_limit: 220gb
  streams:
    - remote: /nvme-data/ligm/data/ettin/books
      local: /nvme-data/ligm/cache/books
      proportion: 0.30
    - remote: /nvme-data/ligm/data/ettin/arxiv-pes2o
      local: /nvme-data/ligm/cache/arxiv-pes2o
      proportion: 0.25
    - remote: /nvme-data/ligm/data/ettin/dclm
      local: /nvme-data/ligm/cache/dclm
      proportion: 0.20
    - remote: /nvme-data/ligm/data/ettin/wikipedia
      local: /nvme-data/ligm/cache/wikipedia
      proportion: 0.10
    - remote: /nvme-data/ligm/data/ettin/stackexchange
      local: /nvme-data/ligm/cache/stackexchange
      proportion: 0.10
    - remote: /nvme-data/ligm/data/ettin/code
      local: /nvme-data/ligm/cache/code
      proportion: 0.05
training:
  method: ligm_weighted
  seed: 11
  max_tokens: 1025016532
  scheduler_origin_tokens: 1000016532
  restart_optimizer: true
  learning_rate: 1.0e-5
  mask_ratio: 0.30
  target_ratio: 0.20
  target_loss_weight: 8.0
  gradient_accumulation: 4
  checkpoint_every_tokens: 25000000
  keep_recent_checkpoints: 2
  log_every_steps: 10
  buckets:
    - length: 8000
      micro_batch_size: 1
      slots: 1
online_evaluation:
  enabled: true
  documents: 128
  reference_dir: /nvme-data/ligm/runs/stage3-random-long-seed11/online-evaluation
  max_local_drop: 0.005

